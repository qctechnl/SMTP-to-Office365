services:
  smtp-to-office365:
    image: qctechnl/smtp-to-office365:latest
    build:
      context: .
    container_name: smtp-to-office365
    restart: unless-stopped

    # =========================================================================
    # Ports
    # =========================================================================
    ports:
      - "${LISTEN_ADDRESS:-0.0.0.0}:${SMTP_PORT:-25}:25"
      - "${LISTEN_ADDRESS:-0.0.0.0}:${SUBMISSION_PORT:-587}:587"

    # =========================================================================
    # Environment
    # =========================================================================
    environment:
      # General
      RELAY_HOSTNAME:         ${RELAY_HOSTNAME}
      RELAY_ALLOWED_NETWORKS: ${RELAY_ALLOWED_NETWORKS}
      RELAY_FROM_ADDRESSES:   ${RELAY_FROM_ADDRESSES}

      # Logging
      LOG_LEVEL:              ${LOG_LEVEL:-info}

      # Inbound TLS (none / may / encrypt)
      SMTP_TLS_LEVEL:         ${SMTP_TLS_LEVEL:-may}
      SUBMISSION_TLS_LEVEL:   ${SUBMISSION_TLS_LEVEL:-may}

      # Inbound TLS certificate (encrypts SMTP connections from local applications)
      SMTP_TLS_CERT_PATH:     ${SMTP_TLS_CERT_PATH:-/certs/smtp.crt}
      SMTP_TLS_KEY_PATH:      ${SMTP_TLS_KEY_PATH:-/certs/smtp.key}

      # OAuth2
      ENTRA_TENANT_ID:       ${ENTRA_TENANT_ID}
      ENTRA_CLIENT_ID:       ${ENTRA_CLIENT_ID}
      ENTRA_AUTH_TYPE:       ${ENTRA_AUTH_TYPE}

      # OAuth2 - only required when ENTRA_AUTH_TYPE=secret
      ENTRA_CLIENT_SECRET:   ${ENTRA_CLIENT_SECRET:-}

      # OAuth2 - only required when ENTRA_AUTH_TYPE=certificate
      # (Entra ID client certificate — distinct from the inbound SMTP TLS certificate)
      ENTRA_CERT_PATH:       ${ENTRA_CERT_PATH:-}
      ENTRA_KEY_PATH:        ${ENTRA_KEY_PATH:-}

      # Graph delivery options
      GRAPH_SAVE_TO_SENT_ITEMS:  ${GRAPH_SAVE_TO_SENT_ITEMS:-false}
      GRAPH_LARGE_ATTACHMENTS:   ${GRAPH_LARGE_ATTACHMENTS:-true}

    # =========================================================================
    # Volumes
    # =========================================================================
    volumes:
      # Certificates: inbound SMTP TLS + Entra ID client cert (bind mount from host)
      - ${CERTS_DIR:-./certs}:/certs:ro

      # SASL user database (manage with manage-users.sh)
      - ${SASLDB_DIR:-./sasldb}:/var/lib/sasl2

      # Persistent mail queue (survive container restarts)
      - postfix-queue:/var/spool/postfix

      # Persistent logs
      - postfix-logs:/var/log

    # =========================================================================
    # Health check
    # =========================================================================
    healthcheck:
      test: ["CMD", "postfix", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # =========================================================================
    # Logging
    # =========================================================================
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postfix-queue:
    driver: local
  postfix-logs:
    driver: local